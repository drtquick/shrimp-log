name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject build number
        run: |
          BUILD="β$(git rev-list --count HEAD).$(git rev-parse --short HEAD)"
          sed -i "s/__BUILD__/$BUILD/g" shrimp_log.html
          echo "Build: $BUILD"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting + Firestore rules
        run: firebase deploy --only hosting,firestore:rules --project shrimp-log-f6567 --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
